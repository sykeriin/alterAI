name: alter
description: ALTER, a voice-first AI Future Operating System.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  camera: ^0.11.4
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  flutter_lucide: ^1.11.0
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  http: ^1.6.0
  http_parser: ^4.1.2
  nfc_manager: ^4.2.1
  nfc_manager_ndef: ^1.1.0
  supabase_flutter: ^2.14.2
  flutter_gemma: ^0.16.5
  url_launcher: ^6.3.2
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.5
  just_audio: ^0.9.46
  shared_preferences: ^2.5.5
  flutter_contacts: ^2.1.0
  notification_listener_service: ^0.3.5
  connectivity_plus: ^6.1.4
  sqflite_sqlcipher: ^3.4.0
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_image_compress: ^2.4.0
  flutter_secure_storage: ^10.3.1
  local_auth: ^2.3.0
  crypto: ^3.0.6
  cryptography: ^2.9.0
  uuid: ^4.5.1
  sherpa_onnx: ^1.12.0
  record: ^6.0.0
  archive: ^4.0.7
  flutter_local_notifications: ^22.0.0
  workmanager: ^0.9.0+3
  geolocator: ^14.0.3

dev_dependencies:
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/alter_icon.png"
  adaptive_icon_background: "#0A0810"
  adaptive_icon_foreground: "assets/branding/alter_icon_fg.png"

dependency_overrides:
  sqflite:
    git:
      url: https://www.github.com/davidmartos96/sqflite_sqlcipher.git
      path: sqflite
      ref: fmdb_override

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/images/alter_logo.png
    - assets/images/alter_mark.png
