name: ALTER CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  flutter:
    name: Flutter test and debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter test
      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: alter-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  api-gateway:
    name: API gateway tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install -e "services/api_gateway[dev]"
      - run: python -m compileall services/api_gateway/src/alter_api_gateway
      - run: python -m pytest services/api_gateway/tests
